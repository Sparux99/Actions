name: Build Debug APK (Fast)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 📥 تحميل الكود
    - name: Checkout
      uses: actions/checkout@v3

    # ⚡ تسريع npm
    - name: Cache Node
      uses: actions/cache@v3
      with:
        path: ~/.npm
        key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

    # ⚡ تسريع Gradle
    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: ~/.gradle
        key: gradle-${{ runner.os }}

    # 🟢 Node
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # ☕ Java
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    # 🤖 Android SDK (الحل الحقيقي للمشكل)
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          platform-tools
          platforms;android-34
          build-tools;35.0.0

    # 📦 Cordova
    - name: Install Cordova
      run: npm install -g cordova

    # 📦 Dependencies
    - name: Install dependencies
      run: npm install

    # ➕ Android platform
    - name: Add Android platform
      run: cordova platform add android@latest

    # ⚡ Build سريع (Debug بدون توقيع)
    - name: Build APK
      run: cordova build android --no-telemetry

    # 📤 رفع APK
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: WeatherApp-Debug-APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk